<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Income Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-500">
    <div class="bg-gray-300 w-1/2 mx-auto mt-10">
      <h1 class="text-xl font-bold text-center py-5">
        Income Expenditure Calculator
      </h1>

      <div class="flex justify-center">
        <p id="netbalance" class="m-4 p-2 bg-indigo-500 text-white">
          Net Balance
        </p>

        <p id="tincome" class="m-4 p-2 bg-emerald-400 text-white">Income</p>

        <p id="texpenses" class="m-4 p-2 bg-red-500 text-white">Expenses</p>
      </div>

      <form id="formid" class="p-4" onsubmit="displayData()">
        <input id="idate" type="date" required />

        <select id="dropdown">
          <option value="income">Income</option>
          <option value="expenses">Expenses</option>
        </select>

        <input id="desc" type="text" placeholder="Description" required />

        <input id="amount" type="number" placeholder="Amount" required />

        <button type="submit">Add</button>
      </form>

      <table border="1" class="w-full">
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Type</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tbody"></tbody>
      </table>
    </div>

    <script src="script.js"></script>
  </body>
</html>
